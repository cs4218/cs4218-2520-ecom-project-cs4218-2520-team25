# covai.yaml — project configuration
# THIS IS A SAMPLE YAML FILE FOR COVAI CONFIG
# copy this file content into a file called covai.yaml

coverage:
  threshold: 80

languages:
  python:
    test_runner: "pytest --cov=. --cov-report=xml"
    coverage_path: "coverage.xml"
    test_framework: "pytest"
    source_extensions: [".py"]
    test_file_pattern: "test_{name}.py"

  typescript:
    test_runner: "npm test -- --coverage"
    coverage_path: "coverage/lcov.info"
    test_framework: "jest"
    source_extensions: [".ts", ".tsx"]
    test_file_pattern: "{name}.test.ts"

ai:
  default_model: "gemini"
  max_iterations: 3
  max_tokens: 4096
  models:
    gemini:
      model: "gemini-3-flash-preview"
      api_key: ""
    claude:
      model: "claude-sonnet-4-20250514"
      api_key: ""

rules:
  ignore:
    - "__init__.py"
    - "*.config.py"
    - "conftest.py"
    - "*/migrations/*"

# SonarQube config: Backend-only analysis
# Analyze server-side sources, tests and coverage reports
sonar.host.url=http://localhost:9000
sonar.token=squ_3445c6857c7c430ce7dd6195f0220ca5f483e99c

sonar.projectKey=econ-backend
sonar.projectName=econ-backend
sonar.projectVersion=1.0

# Backend source folders (adjust if you move files)
sonar.sources=controllers,models,routes,helpers,middlewares,config
sonar.sources+=app.js,server.js

# Tests and patterns
sonar.tests=tests
sonar.test.inclusions=**/*test*.js,**/*.spec.js

# Coverage report path (LCOV) for backend
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Only JS files for backend analysis
sonar.inclusions=**/*.js

# Exclude dependencies and build outputs
sonar.exclusions=node_modules/**,dist/**,build/**,**/*.min.js

sonar.sourceEncoding=UTF-8

# SonarQube config: Frontend-only analysis
# Analyze only the client app (React) sources, tests and coverage
sonar.host.url=http://localhost:9000
sonar.token=squ_3445c6857c7c430ce7dd6195f0220ca5f483e99c

sonar.projectKey=econ-frontend
sonar.projectName=econ-frontend
sonar.projectVersion=1.0

# Source and tests
sonar.sources=client/src
sonar.tests=client/tests
sonar.test.inclusions=**/*.spec.js,**/*.spec.ts,**/*test*.js,**/*test*.ts

# Coverage (LCOV) generated by frontend test/coverage runs
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Include only frontend source files
sonar.inclusions=client/src/**/*.js,client/src/**/*.jsx,client/src/**/*.ts,client/src/**/*.tsx

# Exclude build output and dependencies
sonar.exclusions=client/node_modules/**,client/build/**,client/dist/**,**/*.min.js,client/src/*.js,

sonar.sourceEncoding=UTF-8
